[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "libro-sdk"
version = "0.1.1"
description = "Official Python SDK for the Libro AI memory infrastructure."
authors = [
    { name="Libro Team" }
]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "requests>=2.25.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "mypy>=1.0"
]
